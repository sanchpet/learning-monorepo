<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homelab Intent Classifier</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Homelab chatops</h1>
          <p class="hint">classify-only: модель отвечает, но ничего не исполняет.</p>
        </div>
        <label class="toggle"><input type="checkbox" id="debug" /> debug</label>
      </header>
      <div id="log"></div>
      <form id="form">
        <input
          id="query"
          autocomplete="off"
          placeholder="напр. restart the postgres deployment and tail its logs"
        />
        <button type="submit">Send</button>
      </form>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
