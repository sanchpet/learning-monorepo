apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This directory is the buildable entrypoint. Homelab's Flux Kustomization points
# here (`kubectl kustomize .` / `kustomize build .` must succeed standalone).
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml

# Labels stamp every object so it's greppable and obviously a learning sandbox.
# `includeSelectors: false` — RBAC objects have no selectors; don't touch matchers.
labels:
  - pairs:
      app.kubernetes.io/name: incident-agent
      app.kubernetes.io/part-of: r-014-learning
      learn.sandbox: "true"
    includeSelectors: false
