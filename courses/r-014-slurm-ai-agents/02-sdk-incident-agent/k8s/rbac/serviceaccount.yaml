apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-agent
  namespace: incident-agent-sandbox
  # This is the agent's identity. The external agent process authenticates AS
  # this SA via a token in its kubeconfig — so every kubectl call the agent makes
  # is evaluated against THIS SA's RBAC, not the human's admin kubeconfig.
# automountServiceAccountToken is irrelevant here: no Pod runs as this SA.
# We mint a token explicitly (kubectl create token) into a kubeconfig — see the
# kubeconfig step. That keeps the credential short-lived and out of the cluster.
