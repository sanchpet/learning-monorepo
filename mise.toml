# Мета-инструменты корня репозитория: только то, что нужно генератору индекса.
# Стек конкретного курса/упражнения пиннится в его собственном mise.toml
# (изолированное окружение на проект — см. README § Конвенции).
[tools]
python = "3.14"

# Активация git-hook при входе в каталог: не нужно вручную гонять
# `git config core.hooksPath .githooks` на каждой новой машине.
# Требует mise hooks (settings.experimental) — включено глобально в dotfiles.
[hooks]
enter = "git config core.hooksPath .githooks"
